name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Syntax check all hooks
        shell: bash
        run: |
          set -e
          for f in hooks/*.js; do
            [ -f "$f" ] && node -c "$f"
          done
          for f in hooks/lib/*.js; do
            [ -f "$f" ] && node -c "$f"
          done
          for f in hooks/lib/self-improvement/*.js; do
            [ -f "$f" ] && node -c "$f"
          done
          echo "All hooks pass syntax check"

      - name: Hook runtime tests
        shell: bash
        run: |
          mkdir -p "$HOME/.claude/hooks/lib/self-improvement"
          cp -r hooks/* "$HOME/.claude/hooks/"
          # Run each hook with empty input, verify JSON output
          PASS=0
          FAIL=0
          for f in hooks/*.js; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            result=$(echo '{}' | timeout 10 node "$f" 2>/dev/null || true)
            if echo "$result" | python3 -c "import json,sys; d=json.load(sys.stdin); assert 'continue' in d" 2>/dev/null; then
              PASS=$((PASS + 1))
            else
              echo "FAIL: $name"
              FAIL=$((FAIL + 1))
            fi
          done
          echo "$PASS passed, $FAIL failed"
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Syntax check scripts
        shell: bash
        run: |
          set -e
          for f in scripts/*.mjs; do
            [ -f "$f" ] && node -c "$f" 2>/dev/null && echo "OK: $(basename $f)" || echo "SKIP: $(basename $f) (ESM)"
          done

      - name: Bash script syntax (Linux/macOS only)
        if: runner.os != 'Windows'
        run: |
          for f in scripts/*.sh; do
            [ -f "$f" ] && bash -n "$f" && echo "OK: $(basename $f)"
          done

      - name: Validate skills
        shell: bash
        run: |
          node scripts/validate-skills.mjs --dir skills

      - name: Scrub-gate (no personal tokens in public repo)
        shell: bash
        run: |
          tokens=()
          tokens+=("$(printf 'f%sa%sh%sl%sk%se' '' '' '' '' '')")
          tokens+=("$(printf 'F%sa%sh%sl%sk%se' '' '' '' '' '')")
          tokens+=("$(printf 'D%sa%sa%sb%so%su%sl%se%sx' '' '' '' '' '' '' '')")
          tokens+=("$(printf 'P%so%sr%st%sa%sb%sl%se%s-%sB%su%si%sl%sd%se%sr' '' '' '' '' '' '' '' '' '' '' '' '' '' '' '')")
          tokens+=("$(printf '/%sh%so%sm%se%s/%su%ss%se%sr' '' '' '' '' '' '' '' '' '')")
          tokens+=("$(printf 'k%si%sp%sp%se%sr%s_%se%sl%si%sx%si%sr%ss' '' '' '' '' '' '' '' '' '' '' '' '' '')")
          PATTERN=$(IFS='|'; echo "${tokens[*]}")
          HITS=$(
            grep -rn -E "$PATTERN" . \
              --include='*.md' --include='*.js' --include='*.json' \
              --include='*.sh' --include='*.ps1' \
              2>/dev/null \
            | grep -v '^\./\.git/' \
            | grep -v '/docs/' \
            | grep -v '\.example\b' \
            | grep -v '^\./README\.md' \
            | grep -v '^\./LICENSE' \
            | grep -v '^\./CONTRIBUTING\.md' \
            | grep -v '^\./SECURITY\.md' \
            | grep -v '^\./CHANGELOG\.md' \
            | grep -v '^\./\.github/workflows/ci\.yml' \
            || true
          )
          if [ -n "$HITS" ]; then
            echo "personal tokens detected in public repo:"
            echo "$HITS"
            exit 1
          fi
          echo "scrub-gate OK"
