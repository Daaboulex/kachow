name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Syntax check all hooks
        shell: bash
        run: |
          set -e
          for f in hooks/*.js hooks/lib/*.js; do
            [ -f "$f" ] && node -c "$f"
          done

      - name: Hook selftest (Linux/macOS)
        shell: bash
        if: runner.os != 'Windows'
        run: |
          mkdir -p "$HOME/.claude/hooks/lib"
          cp -r hooks/* "$HOME/.claude/hooks/"
          node hooks/lib/hook-selftest.js

      - name: Hook selftest (Windows — Git-Bash-safe subset)
        shell: bash
        if: runner.os == 'Windows'
        run: |
          # Windows runs the Node-based hooks. POSIX-only hooks (research-lint)
          # may not apply; SELFTEST_ALLOW_MISSING=1 tolerates a partial-subset
          # install while failing on real regressions in hooks that DO run.
          mkdir -p "$HOME/.claude/hooks/lib"
          cp -r hooks/* "$HOME/.claude/hooks/"
          SELFTEST_ALLOW_MISSING=1 node hooks/lib/hook-selftest.js

      - name: Orphan hook file detector
        shell: bash
        run: |
          set -e
          REGISTERED=$(node -e '
            const s = JSON.parse(require("fs").readFileSync("settings.template.json","utf8"));
            const names = new Set();
            for (const ev of Object.values(s.hooks||{})) {
              for (const block of ev) {
                for (const h of block.hooks||[]) {
                  const m = (h.command||"").match(/hooks\/([^\s"\\]+\.js)/);
                  if (m) names.add(m[1]);
                }
              }
            }
            // Also include statusLine.command (separate from hooks block)
            if (s.statusLine?.command) {
              const m = s.statusLine.command.match(/hooks\/([^\s"\\]+\.js)/);
              if (m) names.add(m[1]);
            }
            console.log([...names].join("\n"));
          ')
          FAIL=0
          for f in hooks/*.js; do
            base=$(basename "$f")
            if ! echo "$REGISTERED" | grep -qx "$base"; then
              # Allowlist: documented standalone CLIs
              case "$base" in
                validate-symlinks.js)
                  echo "ALLOWED orphan: $base (standalone CLI)"
                  ;;
                *)
                  echo "::error::orphan hook $base — present in hooks/ but not registered in settings.template.json"
                  FAIL=1
                  ;;
              esac
            fi
          done
          if [ $FAIL -eq 1 ]; then exit 1; fi
          echo "All hook files registered (or whitelisted)."

      - name: Bash script syntax (Linux/macOS only)
        if: runner.os != 'Windows'
        run: |
          # .sh scripts (legacy — being phased out per Wave 7 .mjs migration 2026-04-29)
          shopt -s nullglob
          for f in scripts/*.sh; do
            bash -n "$f"
          done
          shopt -u nullglob

      - name: Node script syntax (cross-platform — .mjs canonical post v0.4)
        shell: bash
        run: |
          shopt -s nullglob
          for f in scripts/*.mjs; do
            node --check "$f"
          done
          shopt -u nullglob

      - name: PowerShell script syntax (Windows + macOS + Linux via pwsh)
        shell: pwsh
        run: |
          Get-ChildItem scripts/*.ps1 | ForEach-Object {
            try {
              [scriptblock]::Create((Get-Content -Raw $_.FullName)) | Out-Null
              Write-Host "OK: $($_.Name)"
            } catch {
              Write-Error "PARSE FAIL: $($_.Name)  $($_.Exception.Message)"
              exit 1
            }
          }

      - name: MCP server smoke test
        shell: bash
        run: |
          # Cross-platform smoke via Node (avoid python3 dep — not on Windows
          # runners by default). Scans all response lines for result.tools.
          RESPONSE=$(
            printf '%s\n%s\n' \
              '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
              '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | node mcp/personal-context/server.js 2>/dev/null
          )
          node -e '
            let buf = "";
            process.stdin.on("data", c => buf += c);
            process.stdin.on("end", () => {
              let n = 0;
              for (const line of buf.split(/\r?\n/)) {
                if (!line.trim()) continue;
                try {
                  const m = JSON.parse(line);
                  if (m.result && Array.isArray(m.result.tools)) { n = m.result.tools.length; break; }
                } catch {}
              }
              if (n < 10) { console.error("expected >=10 tools, got " + n); process.exit(1); }
              console.log("MCP smoke OK: " + n + " tools");
            });
          ' <<< "$RESPONSE"

      - name: Bootstrap smoke (Linux + macOS)
        shell: bash
        if: runner.os != 'Windows'
        run: |
          # Simulate a fresh-machine install in an isolated HOME. Health-check
          # parses BOTH ~/.claude/settings.json AND ~/.claude.json, so seed both.
          export HOME=$(mktemp -d)
          mkdir -p "$HOME/.claude" "$HOME/.gemini"
          echo '{}' > "$HOME/.claude/settings.json"
          echo '{}' > "$HOME/.gemini/settings.json"
          echo '{}' > "$HOME/.claude.json"
          cp -r "$GITHUB_WORKSPACE" "$HOME/.ai-context"
          bash "$HOME/.ai-context/scripts/bootstrap.sh"
          echo "bootstrap smoke OK"

      - name: Bootstrap smoke (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          $fakeHome = Join-Path $env:RUNNER_TEMP ("ai-ctx-smoke-" + [guid]::NewGuid())
          New-Item -ItemType Directory -Path $fakeHome | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $fakeHome '.claude') | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $fakeHome '.gemini') | Out-Null
          Set-Content (Join-Path $fakeHome '.claude/settings.json') '{}'
          Set-Content (Join-Path $fakeHome '.gemini/settings.json') '{}'
          Set-Content (Join-Path $fakeHome '.claude.json') '{}'
          Copy-Item $env:GITHUB_WORKSPACE -Destination (Join-Path $fakeHome '.ai-context') -Recurse
          $env:HOME = $fakeHome
          $env:USERPROFILE = $fakeHome
          & (Join-Path $fakeHome '.ai-context/scripts/bootstrap.ps1')
          Write-Host "bootstrap smoke OK (Windows)"

      - name: Validate skills
        shell: bash
        if: runner.os != 'Windows'
        run: |
          node scripts/validate-skills.js --dir skills
          # Windows parity runs in PowerShell block below.

      - name: Validate skills (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          node scripts/validate-skills.js --dir skills
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Scrub-gate (no personal tokens in public repo)
        shell: bash
        run: |
          # Delegate to the shipped pre-push gate so CI + local enforcement
          # share one token list. Prior inline duplication drifted — CI was a
          # strict subset of scripts/scrub-check.mjs.
          node scripts/scrub-check.mjs

      - name: Lib unit tests
        shell: bash
        if: runner.os != 'Windows'
        run: |
          if [ -f hooks/tests/lib-unit-tests.js ]; then
            node hooks/tests/lib-unit-tests.js
          else
            echo "lib-unit-tests.js not present — skipping"
          fi

      - name: Lib unit tests (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          if (Test-Path hooks/tests/lib-unit-tests.js) {
            node hooks/tests/lib-unit-tests.js
            if ($LASTEXITCODE -ne 0) { exit 1 }
          } else {
            Write-Host "lib-unit-tests.js not present — skipping"
          }

      - name: Regression fixtures
        shell: bash
        if: runner.os != 'Windows'
        run: |
          if [ -x hooks/tests/run-regressions.sh ]; then
            bash hooks/tests/run-regressions.sh
          else
            echo "run-regressions.sh not present — skipping"
          fi
