name: Upstream Release Drift Watch

on:
  schedule:
    # Weekly Mon 12:00 UTC
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-drift:
    # Suppress phantom "failure" runs on push events (workflow only triggers on
    # schedule/workflow_dispatch, but GitHub still records a workflow_run when
    # the workflow file is modified in a push). This guard returns success.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned versions from VERSION-DEPS file
        id: pinned
        run: |
          if [ -f .github/VERSION-DEPS ]; then
            CC_PIN=$(grep '^claude-code=' .github/VERSION-DEPS | cut -d= -f2)
            GC_PIN=$(grep '^gemini-cli=' .github/VERSION-DEPS | cut -d= -f2)
          else
            CC_PIN="2.1.119"
            GC_PIN="0.39.0"
          fi
          echo "cc=$CC_PIN" >> "$GITHUB_OUTPUT"
          echo "gc=$GC_PIN" >> "$GITHUB_OUTPUT"

      - name: Fetch upstream latest releases
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CC_LATEST=$(gh api repos/anthropics/claude-code/releases/latest --jq .tag_name | sed 's/^v//')
          GC_LATEST=$(gh api repos/google-gemini/gemini-cli/releases/latest --jq .tag_name | sed 's/^v//')
          echo "cc=$CC_LATEST" >> "$GITHUB_OUTPUT"
          echo "gc=$GC_LATEST" >> "$GITHUB_OUTPUT"

      - name: Compare and open issue if drift detected
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CC_PIN: ${{ steps.pinned.outputs.cc }}
          GC_PIN: ${{ steps.pinned.outputs.gc }}
          CC_LATEST: ${{ steps.latest.outputs.cc }}
          GC_LATEST: ${{ steps.latest.outputs.gc }}
        run: |
          DRIFT=""
          if [ "$CC_PIN" != "$CC_LATEST" ]; then
            DRIFT="${DRIFT}- Claude Code: pinned $CC_PIN -> latest $CC_LATEST\n"
          fi
          if [ "$GC_PIN" != "$GC_LATEST" ]; then
            DRIFT="${DRIFT}- Gemini CLI: pinned $GC_PIN -> latest $GC_LATEST\n"
          fi
          if [ -z "$DRIFT" ]; then
            echo "No drift; pinned versions current."
            exit 0
          fi

          # Skip if open issue already exists for this drift
          EXISTING=$(gh issue list --state open --label upstream-drift --json title --jq '.[].title' | grep -F "Upstream drift detected" || true)
          if [ -n "$EXISTING" ]; then
            echo "Open drift issue already exists; skipping."
            exit 0
          fi

          gh issue create \
            --title "Upstream drift detected ($(date -u +%Y-%m-%d))" \
            --label upstream-drift \
            --body "Scheduled drift check found new upstream releases.

$(printf "$DRIFT")

Review release notes:
- https://github.com/anthropics/claude-code/releases
- https://github.com/google-gemini/gemini-cli/releases

Update \`.github/VERSION-DEPS\` and re-test before bumping the framework's pinned support floor."
